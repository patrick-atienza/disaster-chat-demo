# pass through the original proto/host if behind another proxy (e.g. codespaces)
map $http_x_forwarded_proto $fwd_proto {
    default $scheme;
    https   https;
}

# codespaces sends the real hostname in x-forwarded-host
map $http_x_forwarded_host $fwd_host {
    default $http_host;
    "~.+"   $http_x_forwarded_host;
}

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # keycloak
    location /realms/ {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $fwd_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $fwd_host;
    }

    location /resources/ {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $fwd_host;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }

    location /admin/ {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $fwd_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $fwd_host;
    }

    location /js/ {
        proxy_pass http://keycloak:8080;
    }
}
